<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techboard</title>
</head>
<body>
    <header>
    <h1>Pesquisa online</h1>
    </header>  
    <section>
       <form action="" method="get">
             <fieldset>
                
                <legend>Dados pessoais</legend>
                <label for="userName">Nome</label>
                <input type="text" name="userName" required>
                <br>
                <label for="userAge">Idade</label>
                <input type="number" name="userAge" min="12" max="100" required>
                <br>
                 <laber for="birthDate">Data de nascimento</laber>
                <input type="date" name="birthDate">
                <br>
                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>
                <br>
                <label for="userPhoNumber">Telefone</label>
                <input type="tel"name="userPhoNumber"pattern="[0-9]{11}" placeholder="DDD + números sem espaço ou hífen">
                <br>  
                <label for="userImage">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage">
                 <br>






            </fieldset> 




            <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input id="fem" type="radio" name="userName" value="Feminino">
            <label for="fem">Feminino</label>

            <input id="masc" type="radio" name="userGender" value="Masculino">
            <label for="masc">Masculino</label>

            <input id="notInformed" type="radio" name="userGender" value="notInformed">
            <label for="notInformed">Prefiro não informar</label>

           </fieldset>

             
            <fieldset>
                <legend>Perfil</legend>
                
                <label for="userState">Estado</label>
           <select name="userState" required>
                <option value="acre">Acre</option>
                <option value="alagoas">Alagoas</option>
                <option value="amapa">Amapá</option>
                <option value="amazonas">Amazonas</option>
                <option value="bahia">Bahia</option>
                <option value="ceara">Ceará</option>
                <option value="distritofederal">Distrito Federal</option>
                <option value="espiritosanto">Espírito Santo</option>
                <option value="goias">Goiás</option>
                <option value="maranhao">Maranhão</option>
                <option value="matogrosso">Mato Grosso</option>
                <option value="matogrossodosul">Mato Grosso do Sul</option>
                <option value="minasgerais">Minas Gerais</option>
                <option value="para">Pará</option>
                <option value="paraiba">Paraíba</option>
                <option value="parana">Paraná</option>
                <option value="pernambuco">Pernambuco</option>
                <option value="piaui">Piauí</option>
                <option value="riodejaneiro">Rio de Janeiro</option>
                <option value="riograndedonorte">Rio Grande do Norte</option>
                <option value="riograndedosul">Rio Grande do Sul</option>
                <option value="rondonia">Rondônia</option>
                <option value="roraima">Roraima</option>
                <option value="santacatarina">Santa Catarina</option>
                <option value="saopaulo">São Paulo</option>
                <option value="sergipe">Sergipe</option>
                <option value="tocantins">Tocantins</option>
                <br>
                
                
                
                <label for="userCity">Cidade:</label>
                <input type="text" id="userCity" name="userCity" autocomplete="address-level2" placeholder="Ex: florianopolis">

              




    </select>
           </fieldset> 
 


            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>
                <input type="checkbox" name="social" value="instagram">
                <label for="social">Instagram</label>
                <input type="checkbox" id="facebook" name="social" value="facebook">
                <label for="facebook">Facebook</label>

                <input type="checkbox" id="linkedin" name="social" value="linkedin">
                <label for="linkedin">LinkedIn</label>

                <input type="checkbox" id="x" name="social" value="x">
                <label for="x">X</label>
                <br>
                <label for= musicStyle>Estilo musical:</label>
                <input id="musicStyle" name="usermusicStyle" type="text" list="styleTypes">
                <datalist id="styleTypes">
                <datalist id="styleTypes">
                <option value="rock"></option>
                <option value="sertanejo"></option>
                <option value="funk"></option>
                <option value="metal"></option>
                <option value="classic"></option>

                </datalist>
              
                

            </fieldset>


            <fieldset>
                <legend>Opinião</legend>
                <p>O que você acha da qualidade do nosso serviço?</p>

                <input type="radio" id="otimo" name="userServiceOpinion" value="otima">
                <label for="otimo">Ótima</label>


                <input type="radio" id="boa" name="userServiceOpinion" value="boa">
                <label for="boa">Boa</label>


                <input type="radio" id="regular" name="userServiceOpinion" value="regular">
                <label for="regular">Regular</label>



                <input type="radio" id="ruim"  name="userServiceOpinion" value="ruim">
                <label for="ruim">Ruim</label>
                <br>
                <br>
                <br>
                <label for="comment">Escreva sua opinião:</label>
                <textarea for="comment" name="userComment" placeholder="Digite aqui..."></textarea>
            </fieldset>
        

             <button type= submit>Enviar</button>
        </form>
    </section>
</body>
</html>
